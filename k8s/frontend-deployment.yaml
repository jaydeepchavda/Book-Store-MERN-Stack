apiVersion: apps/v1
kind: Deployment

metadata:
  name: bookstore-frontend

spec:

  replicas: 1

  selector:
    matchLabels:
      app: frontend

  template:

    metadata:
      labels:
        app: frontend

    spec:

      containers:

      - name: frontend

        image: jaydeepchavda/bookstore-frontend:v1

        imagePullPolicy: Always

        ports:
        - containerPort: 5173