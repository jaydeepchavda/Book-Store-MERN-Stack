apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  namespace: bookstore-dev
spec:

  replicas: 2

  selector:
    matchLabels:
      app: bookstore-frontend

  template:
    metadata:
      labels:
        app: bookstore-frontend

    spec:
      containers:

      - name: bookstore-frontend

        image: jaydipaws/bookstore-frontend:v1

        ports:
        
        - containerPort: 5173
