apiVersion: apps/v1
kind: StatefulSet


metadata:
  name: bookstore-mongo
  namespace: bookstore-dev

spec:
  serviceName: mongo

  replicas: 1


  selector:
    matchLabels:
      app: bookstore-mongo

  template:
    metadata:
      labels:
        app: bookstore-mongo

        
    spec:
      containers:
      - name: bookstore-mongo
        image: mongo:7
        ports:
        - containerPort: 27017
        
        
