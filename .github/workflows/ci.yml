name: Book Store CI

on:
  pull_request:
    branches:
      - main

  push:
    branches:
      - main

env:
  BACKEND_IMAGE: jaydeepchavda/bookstore-backend
  FRONTEND_IMAGE: jaydeepchavda/bookstore-frontend

jobs:
  build-and-push:

    runs-on: ubuntu-latest
    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Backend --------------------------------------------------------------
      - name: Install Backend Dependencies
        working-directory: backend
        run: npm ci

      - name: Build Backend
        working-directory: backend
        run: npm run build --if-present

      # Frontend ----------------------------------------------------------
      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Frontend
        working-directory: frontend
        run: npm run build

      # Docker Login
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Backend Image
      - name: Build Backend Docker Image
        run: |
          docker build \
          -t $BACKEND_IMAGE:${{ github.sha }} \
          -t $BACKEND_IMAGE:latest \
          ./backend

      - name: Push Backend Docker Image
        run: |
          docker push $BACKEND_IMAGE:${{ github.sha }}
          docker push $BACKEND_IMAGE:latest

      # Frontend Image
      - name: Build Frontend Docker Image
        run: |
          docker build \
          -t $FRONTEND_IMAGE:${{ github.sha }} \
          -t $FRONTEND_IMAGE:latest \
          ./frontend

      - name: Push Frontend Docker Image
        run: |
          docker push $FRONTEND_IMAGE:${{ github.sha }}
          docker push $FRONTEND_IMAGE:latest